version: 0.1

tools:
  definitions:
    - name: pyrefly
      runtime: python
      package: pyrefly
      shims: [pyrefly]
      known_good_version: 0.60.0

lint:
  definitions:
    - name: pyrefly
      files: [python]
      description: A fast Python type checker from Meta built in Rust
      tools: [pyrefly]
      suggest_if: files_present
      known_good_version: 0.60.0
      commands:
        - name: lint
          output: regex
          run: pyrefly check --output-format=min-text --summary=none ${target}
          success_codes: [0, 1]
          parse_regex: "(?P<severity>\\w+) (?P<path>[^:]+):(?P<line>\\d+):(?P<col>\\d+)(?:-\\d+)?: (?P<message>.*?) \\[(?P<code>[^\\]]+)\\]"
          read_output_from: stdout
          batch: true
          cache_results: true
